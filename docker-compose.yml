version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: forest_fire_db
    environment:
      POSTGRES_USER: ${DB_USER:-fireuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-firepass123}
      POSTGRES_DB: ${DB_NAME:-forestfire}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fireuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
